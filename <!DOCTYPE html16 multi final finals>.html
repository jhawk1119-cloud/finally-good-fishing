<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Fishing: Eternal Forge - Artifacts & Crafting</title>
    <style>
        body { 
            background: #4cc9f0; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; color: #2b2d42;
            transition: all 1.5s ease;
        }
        .stats-bar { 
            background: white; padding: 15px; border-radius: 15px; display: flex; 
            gap: 20px; margin-bottom: 10px; width: 950px; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        canvas { background: #0077b6; border: 8px solid #f2d492; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: border-color 1s; }
        
        .layout { display: flex; gap: 20px; width: 1000px; margin-top: 20px; height: 600px; }
        .panel { background: rgba(255,255,255,0.9); padding: 20px; border-radius: 15px; flex: 1; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #ddd; }
        .artifact-item { border-left: 5px solid #f1c40f; background: #fffdf0; margin-bottom: 5px; }
        
        .btn { padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 6px; border: none; transition: 0.2s; }
        .buy-btn { background: #4361ee; color: white; }
        .forge-btn { background: #f72585; color: white; }
        .luck-btn { background: #2ecc71; color: white; }
        .sell-btn { background: #4cc9f0; color: white; width: 100%; margin-bottom: 15px; font-size: 16px; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #log { font-size: 22px; font-weight: bold; color: white; margin: 15px; text-shadow: 2px 2px #000; height: 35px; text-align: center; }
        h3 { margin-top: 0; color: #0077b6; border-bottom: 2px solid #0077b6; display: flex; justify-content: space-between; }
        .luck-text { color: #2ecc71; font-weight: bold; }
        b { color: #4361ee; }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div>💰 Cash: <b id="m-val">$0</b></div>
        <div>🎣 Rod: <b id="r-val">Wooden Rod</b></div>
        <div>✨ Multi: <b id="x-val">1x</b></div>
        <div>📈 Lvl: <b id="lvl-val">1</b></div>
        <div>🍀 Luck: <b id="l-val" class="luck-text">1.0x</b></div>
        <div>🌍 Realm: <b id="realm-val">Azure Lake</b></div>
    </div>

    <canvas id="canvas" width="900" height="160"></canvas>
    <div id="log">SPACE TO CAST</div>

    <div class="layout">
        <div class="panel">
            <h3>🏺 Artifacts <small id="art-count">0/5</small></h3>
            <div id="artifact-box"></div>
            
            <h3 style="margin-top:20px;">⚒️ The Forge</h3>
            <div id="forge-box"></div>

            <h3 style="margin-top:20px;">🛒 General Shop</h3>
            <div id="luck-box">
                <div class="item">
                    <div><b>Luck Potion</b><br><small>Permanent +0.1x Luck</small></div>
                    <button class="btn luck-btn" onclick="buyLuck()">Buy ($<span id="luck-cost">500</span>)</button>
                </div>
            </div>
            <div id="shop-box"></div>
        </div>

        <div class="panel">
            <h3>🎒 Collection</h3>
            <button class="btn sell-btn" onclick="sellAll()">Sell All Fish</button>
            <div id="inv-box"></div>
        </div>
    </div>

<script>
/** * 1. FISH DATA
 */
const rarities = [
    { name: "Sardine", chance: 0.25, val: 10, col: "#94a3b8" }, { name: "Bass", chance: 0.15, val: 50, col: "#2ecc71" },
    { name: "Trout", chance: 0.12, val: 200, col: "#3498db" }, { name: "Catfish", chance: 0.10, val: 450, col: "#7f8c8d" },
    { name: "Salmon", chance: 0.08, val: 900, col: "#ff7f50" }, { name: "Tuna", chance: 0.07, val: 2500, col: "#4361ee" },
    { name: "Mahi Mahi", chance: 0.06, val: 5000, col: "#00ffcc" }, { name: "Swordfish", chance: 0.05, val: 12000, col: "#4895ef" },
    { name: "Hammerhead", chance: 0.04, val: 25000, col: "#5d6d7e" }, { name: "Golden Carp", chance: 0.03, val: 75000, col: "#ffd700" },
    { name: "Electric Eel", chance: 0.015, val: 400000, col: "#fee440" }, { name: "Magma Ray", chance: 0.01, val: 2000000, col: "#f94144" },
    { name: "Void Whale", chance: 0.004, val: 100000000, col: "#3a0ca3" }, { name: "Nebula Squid", chance: 0.002, val: 750000000, col: "#7209b7" },
    { name: "Galaxy Shark", chance: 0.001, val: 5000000000, col: "#b5179e" }, { name: "Reality Glitch", chance: 0.0001, val: 2500000000000, col: "#000" },
    { name: "The Creator", chance: 0.0000005, val: 999999999999999999, col: "#636e72" }
];

/** * 2. ROD DATA (RESTORED FORGE)
 */
const rods = [
    { id: 0, name: "Wooden Rod", cost: 0, multi: 1, luck: 1.0, size: 80, type: 'shop' },
    { id: 1, name: "Carbon Pole", cost: 1500, multi: 15, luck: 1.1, size: 82, type: 'shop' },
    { id: 2, name: "Alloy King", cost: 250000, multi: 1000, luck: 1.5, size: 86, type: 'shop' },
    { id: 3, name: "Master's Will", cost: 100000000, multi: 50000, luck: 3.0, size: 90, type: 'shop' },
    { id: 4, name: "Obsidian Pole", cost: 750000000000, multi: 50000000, luck: 12.0, size: 98, type: 'shop' },
    { id: 5, name: "God-Tier Rod", cost: 1000000000000000, multi: 100000000000, luck: 100.0, size: 110, type: 'shop' },
    { id: 6, name: "Devourer", cost: 50000000000000000, multi: 999999999999, luck: 250.0, size: 125, type: 'shop' },
    
    // CRAFTABLE RODS
    { id: 10, name: "Electric Striker", cost: 500000, multi: 4000, luck: 2.5, size: 90, type: 'forge', req: "Electric Eel", qty: 3 },
    { id: 11, name: "Magma Weaver", cost: 10000000, multi: 80000, luck: 5.0, size: 92, type: 'forge', req: "Magma Ray", qty: 3 },
    { id: 12, name: "Void Taker", cost: 250000000, multi: 1000000, luck: 10.0, size: 94, type: 'forge', req: "Void Whale", qty: 5 },
    { id: 13, name: "Nebula Siphon", cost: 5000000000, multi: 25000000, luck: 25.0, size: 96, type: 'forge', req: "Nebula Squid", qty: 10 },
    { id: 14, name: "Galaxy Reaper", cost: 50000000000, multi: 500000000, luck: 50.0, size: 100, type: 'forge', req: "Galaxy Shark", qty: 2 },
    { id: 15, name: "Creator's Hand", cost: 999000000000000000, multi: 999999999999999, luck: 50000.0, size: 200, type: 'forge', req: "The Creator", qty: 1 }
];

const artifacts = {
    "Golden Compass": { desc: "Target bar moves 30% slower", chance: 0.01 },
    "Midas Scale": { desc: "All fish are worth 2x more", chance: 0.005 },
    "Ancient Magnet": { desc: "Target zone is 20% larger", chance: 0.008 },
    "Ether Gem": { desc: "Passive +5.0x Luck", chance: 0.002 },
    "Time Sands": { desc: "Casting is 50% faster", chance: 0.001 }
};

const realms = [
    { name: "Azure Lake", lvl: 1, bg: "#4cc9f0", canvas: "#0077b6", border: "#f2d492" },
    { name: "Magma Caverns", lvl: 5, bg: "#9b2226", canvas: "#600001", border: "#ffb703" },
    { name: "Void Rift", lvl: 10, bg: "#240046", canvas: "#10002b", border: "#9d4edd" },
    { name: "Celestial Origin", lvl: 20, bg: "#000814", canvas: "#001d3d", border: "#fff" }
];

let p = { money: 0, inv: {}, owned: [0], active: 0, xp: 0, lvl: 1, luckBonus: 1.0, luckPots: 0, artifacts: [] };
let state = "IDLE", barX = 100, barD = 1, tarX = 300, tarW = 100;

/** * 3. LOGIC
 */
function updateUI() {
    const r = rods.find(x => x.id === p.active);
    const artLuck = p.artifacts.includes("Ether Gem") ? 5.0 : 0;
    const totalLuck = (p.luckBonus * r.luck + artLuck).toFixed(1);
    
    document.getElementById('m-val').innerText = "$" + p.money.toLocaleString();
    document.getElementById('r-val').innerText = r.name;
    document.getElementById('x-val').innerText = r.multi.toLocaleString() + "x";
    document.getElementById('lvl-val').innerText = p.lvl;
    document.getElementById('l-val').innerText = totalLuck + "x";
    
    const luckCost = Math.floor(500 * Math.pow(1.5, p.luckPots));
    document.getElementById('luck-cost').innerText = luckCost.toLocaleString();

    const currentRealm = [...realms].reverse().find(re => p.lvl >= re.lvl);
    document.getElementById('realm-val').innerText = currentRealm.name;
    document.body.style.background = currentRealm.bg;
    document.getElementById('canvas').style.background = currentRealm.canvas;
    document.getElementById('canvas').style.borderColor = currentRealm.border;

    const sBox = document.getElementById('shop-box');
    const fBox = document.getElementById('forge-box');
    sBox.innerHTML = ''; fBox.innerHTML = '';

    rods.forEach(rod => {
        const owned = p.owned.includes(rod.id);
        const canAfford = p.money >= rod.cost;
        let canForge = true;
        if (rod.type === 'forge') {
            canForge = (p.inv[rod.req] || 0) >= rod.qty;
        }

        const html = `
            <div class="item">
                <div><b>${rod.name}</b><br><small>${owned ? 'Owned' : (rod.type==='forge' ? 'Need '+rod.qty+' '+rod.req+' & $'+rod.cost.toLocaleString() : '$'+rod.cost.toLocaleString())}</small></div>
                <button class="btn ${rod.type==='shop'?'buy-btn':'forge-btn'}" onclick="buy(${rod.id})" ${(!owned && (!canAfford || !canForge)) ? 'disabled' : ''}>
                    ${owned ? (p.active === rod.id ? 'Equip' : 'Equip') : 'Get'}
                </button>
            </div>`;
        if (rod.type === 'shop') sBox.innerHTML += html; else fBox.innerHTML += html;
    });

    const aBox = document.getElementById('artifact-box');
    aBox.innerHTML = '';
    p.artifacts.forEach(art => { aBox.innerHTML += `<div class="item artifact-item"><div><b>${art}</b><br><small>${artifacts[art].desc}</small></div><span style="color:#f1c40f">★</span></div>`; });
    document.getElementById('art-count').innerText = `${p.artifacts.length}/5`;

    const iBox = document.getElementById('inv-box');
    iBox.innerHTML = '';
    for (let k in p.inv) if (p.inv[k] > 0) iBox.innerHTML += `<div class="item">${k} <b>x${p.inv[k]}</b></div>`;
}

function buyLuck() {
    const cost = Math.floor(500 * Math.pow(1.5, p.luckPots));
    if (p.money >= cost) { p.money -= cost; p.luckBonus += 0.1; p.luckPots++; save(); updateUI(); }
}

function buy(id) {
    const r = rods.find(x => x.id === id);
    if (p.owned.includes(id)) p.active = id;
    else {
        p.money -= r.cost;
        if (r.type === 'forge') p.inv[r.req] -= r.qty;
        p.owned.push(id); p.active = id;
    }
    save(); updateUI();
}

function sellAll() {
    const mScale = p.artifacts.includes("Midas Scale") ? 2 : 1;
    for (let k in p.inv) {
        let count = p.inv[k];
        let data = rarities.find(f => f.name === k);
        if (data) p.money += (data.val * count * mScale);
        p.inv[k] = 0;
    }
    save(); updateUI();
}

function save() { localStorage.setItem('EternalFish_Complete_Save', JSON.stringify(p)); }
function load() {
    let s = localStorage.getItem('EternalFish_Complete_Save');
    if (s) { p = JSON.parse(s); }
    updateUI();
}

/** * 4. ENGINE
 */
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');

function loop() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);
    if (state === "MINIGAME") {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(100, 65, 700, 30);
        ctx.fillStyle = "#ffd700";
        ctx.fillRect(tarX, 65, tarW, 30);
        ctx.fillStyle = "#ff4d4d"; // Perfect Strike Zone
        ctx.fillRect(tarX + (tarW/2) - 5, 65, 10, 30);
        
        let speed = 6;
        if (p.artifacts.includes("Golden Compass")) speed *= 0.7;
        barX += speed * barD;
        if (barX > 790 || barX < 100) barD *= -1;
        
        ctx.fillStyle = "white";
        ctx.fillRect(barX, 55, 12, 50);
    }
    requestAnimationFrame(loop);
}

window.addEventListener('keydown', (e) => {
    if (e.code === "Space") {
        e.preventDefault();
        const r = rods.find(x => x.id === p.active);
        
        if (state === "IDLE") {
            state = "WAITING";
            document.getElementById('log').innerText = "Casting...";
            let castTime = 1000 + Math.random() * 1000;
            if (p.artifacts.includes("Time Sands")) castTime *= 0.5;
            setTimeout(() => { 
                state = "MINIGAME"; 
                tarW = p.artifacts.includes("Ancient Magnet") ? r.size * 1.2 : r.size;
                tarX = 150 + Math.random() * (600 - tarW); 
                document.getElementById('log').innerText = "STRIKE!"; 
            }, castTime);
        } else if (state === "MINIGAME") {
            if (barX >= tarX && barX <= tarX + tarW) {
                const artLuck = p.artifacts.includes("Ether Gem") ? 5.0 : 0;
                const totalLuck = p.luckBonus * r.luck + artLuck;
                let weighted = rarities.map(f => ({ ...f, weight: f.val > 100 ? f.chance * totalLuck : f.chance }));
                let totalWeight = weighted.reduce((s, f) => s + f.weight, 0);
                let roll = Math.random() * totalWeight, cum = 0, f = rarities[0];
                for (let fish of weighted) { cum += fish.weight; if (roll < cum) { f = fish; break; } }
                
                let critMulti = 1;
                if (barX >= (tarX + (tarW/2) - 10) && barX <= (tarX + (tarW/2) + 10)) {
                    critMulti = 5;
                    document.getElementById('log').innerText = "!!! CRITICAL STRIKE !!!";
                }

                let win = Math.floor(f.val * r.multi * critMulti);
                p.money += win;
                p.inv[f.name] = (p.inv[f.name] || 0) + 1;
                
                // Artifact Discovery
                for (let a in artifacts) {
                    if (!p.artifacts.includes(a) && Math.random() < artifacts[a].chance) {
                        p.artifacts.push(a);
                        alert("🏺 FOUND ANCIENT ARTIFACT: " + a);
                    }
                }

                p.xp += f.val / 10;
                if (p.xp >= p.lvl * 500) { p.lvl++; p.xp = 0; }
                document.getElementById('log').innerHTML = `<span style="color:${f.col}">${f.name}</span> caught! +$${win.toLocaleString()}`;
            } else { document.getElementById('log').innerText = "Snapped!"; }
            state = "IDLE"; save(); updateUI();
        }
    }
});

load(); loop();
</script>
</body>
</html>
